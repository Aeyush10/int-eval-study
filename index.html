<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F6F4F0;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #6B6560;
      --accent: #2D5A3D;
      --accent-light: #E8F0EB;
      --accent-hover: #1E3F2B;
      --border: #E0DCD6;
      --error: #B5443A;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 48px 48px 80px;
    }

    /* ---------- Header ---------- */
    .header {
      margin-bottom: 48px;
      text-align: center;
    }
    .header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .participant-badge {
      display: inline-block;
      margin-top: 16px;
      padding: 6px 16px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ---------- States ---------- */
    .state { display: none; }
    .state.active { display: block; }

    /* ---------- Loading ---------- */
    .loading {
      text-align: center;
      padding: 80px 0;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Error ---------- */
    .error-box {
      text-align: center;
      padding: 60px 0;
    }
    .error-box p {
      color: var(--error);
      margin-bottom: 20px;
    }

    /* ---------- Progress ---------- */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }

    /* ---------- Question Card ---------- */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question-card .q-number {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .question-card .q-text {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.15rem;
      margin-bottom: 24px;
      line-height: 1.45;
    }

    /* ---------- Likert Scale ---------- */
    .likert-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .likert-scale {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .likert-scale label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .likert-scale input[type="radio"] { display: none; }
    .likert-scale .likert-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }
    .likert-scale label:hover .likert-btn {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .likert-scale input:checked ~ .likert-btn {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }
    .likert-endpoints {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: -4px;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    /* ---------- Textarea ---------- */
    .text-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .text-response {
      width: 100%;
      min-height: 100px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      transition: border-color 0.2s ease;
    }
    .text-response:focus {
      outline: none;
      border-color: var(--accent);
    }
    .text-response::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .unanswered {
      border-color: var(--error) !important;
    }
    .unanswered .q-number {
      color: var(--error) !important;
    }

    /* ---------- Preferences ---------- */
    .preferences {
      margin-bottom: 24px;
    }
    .preferences h3 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 10px;
      color: var(--accent);
    }
    .preferences ul {
      list-style: none;
      padding: 0;
    }
    .preferences li {
      padding: 8px 14px;
      background: var(--accent-light);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 1.1rem;
      color: var(--text);
      line-height: 1.5;
    }

    /* ---------- Conversation ---------- */
    .conversation {
      margin-bottom: 24px;
    }
    .conversation h3 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    .conv-messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 600px;
      overflow-y: auto;
      padding: 16px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .conv-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 1.05rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .conv-msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .conv-msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .conv-msg-role {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled {
      background: var(--border);
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--text-secondary);
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
    }

    /* ---------- Thank You ---------- */
    .thankyou {
      text-align: center;
      padding: 60px 0;
    }
    .thankyou .check {
      width: 64px; height: 64px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .thankyou .check svg { width: 28px; height: 28px; color: var(--accent); }
    .thankyou h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .thankyou p { color: var(--text-secondary); }
    .thankyou .pid-display {
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--accent-light);
      border-radius: 8px;
      display: inline-block;
      font-weight: 600;
      color: var(--accent);
      font-size: 0.9rem;
    }

    /* ---------- Config banner ---------- */
    .config-banner {
      background: #FFF3CD;
      border: 1px solid #FFDB6D;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
      font-size: 0.88rem;
      line-height: 1.7;
    }
    .config-banner strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
    .config-banner code {
      background: rgba(0,0,0,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ========== CONFIGURATION ========== -->
    <!-- 
      Replace these two values with your own URLs after setup:
      1. APPS_SCRIPT_URL  — your deployed Google Apps Script web app URL
      2. QUESTIONS_TO_SHOW — how many random questions each participant sees
    -->

    <div class="header">
      <h1>Survey</h1>
      <p>Thank you for participating</p>
    </div>

    <!-- Loading state -->
    <div id="state-loading" class="state active">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading questions…</p>
      </div>
    </div>

    <!-- Config needed state -->
    <div id="state-config" class="state">
      <div class="config-banner">
        <strong>⚙️ Setup required</strong>
        Open this HTML file and set your <code>APPS_SCRIPT_URL</code> at the top of the &lt;script&gt; tag.
        See the README for instructions.
      </div>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state">
      <div class="error-box">
        <p id="error-message">Something went wrong.</p>
        <button class="btn btn-secondary" onclick="location.reload()">Try again</button>
      </div>
    </div>

    <!-- Survey state -->
    <div id="state-survey" class="state">
      <div class="participant-badge" id="pid-badge"></div>
      <br><br>
      <div id="questions-container"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="back-btn" onclick="navigateQuestion(-1)">Back</button>
        <button class="btn btn-primary" id="next-btn" onclick="navigateQuestion(1)">Next</button>
        <button class="btn btn-primary" id="submit-btn" onclick="handleSubmit()" style="display:none;">Submit responses</button>
      </div>
    </div>

    <!-- Thank you state -->
    <div id="state-thankyou" class="state">
      <div class="thankyou">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2>Thank you!</h2>
        <p>Your responses have been recorded.</p>
        <div class="pid-display" id="pid-display"></div>
      </div>
    </div>

  </div>

<script>
// ============================================================
//  ⚙️  CONFIGURE THESE TWO VALUES
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPFnEAgvm3sfbDSbMpwof9anIlxlLa84EVpcnXzqeNcM1BKaBVzDBD_pvBzhsduwv6/exec";   // paste your deployed web app URL here
const QUESTIONS_TO_SHOW = 3;  // how many random questions per participant
// ============================================================

const CURATED_QUESTIONS_URL = "questions_creation/curated_questions.json";

let selectedQuestions = [];
let curatedData = {};
let participantId = "";
let currentQuestion = 0;

// --- Escape HTML to prevent XSS ---
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// --- State management ---
function showState(id) {
  document.querySelectorAll(".state").forEach(s => s.classList.remove("active"));
  document.getElementById("state-" + id).classList.add("active");
}

// --- Generate a participant ID (e.g. P-8A3F2C) ---
function generateParticipantId() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return "P-" + code;
}

// --- Shuffle array (Fisher-Yates) ---
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// --- Load questions from Apps Script (GET) ---
async function loadQuestions() {
  if (!APPS_SCRIPT_URL) {
    showState("config");
    return;
  }

  try {
    const [res, curatedRes] = await Promise.all([
      fetch(APPS_SCRIPT_URL),
      fetch(CURATED_QUESTIONS_URL)
    ]);
    const json = await res.json();
    const curatedArr = await curatedRes.json();

    // Index curated questions by question_ID
    curatedData = {};
    curatedArr.forEach(q => { curatedData[q.question_ID] = q; });

    if (json.status !== "success" || !json.questions.length) {
      throw new Error("No questions returned. Check your Questions sheet.");
    }

    const all = json.questions;
    const count = Math.min(QUESTIONS_TO_SHOW, all.length);
    selectedQuestions = shuffle(all).slice(0, count);
    participantId = generateParticipantId();

    renderSurvey();
    showState("survey");
  } catch (err) {
    document.getElementById("error-message").textContent = err.message;
    showState("error");
  }
}

// --- Render questions ---
function renderSurvey() {
  document.getElementById("pid-badge").textContent = "Your ID: " + participantId;

  const container = document.getElementById("questions-container");
  container.innerHTML = "";

  selectedQuestions.forEach((q, idx) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = "card-" + idx;
    card.style.display = "none";

    let likertHtml = "";
    for (let i = 1; i <= 5; i++) {
      const inputId = "q" + idx + "_l" + i;
      likertHtml += `
        <label for="${inputId}">
          <input type="radio" id="${inputId}" name="q${idx}_likert" value="${i}" onchange="handleLikertSelect(this)">
          <span class="likert-btn">${i}</span>
        </label>`;
    }

    const curated = curatedData[q.questionId];
    let prefsHtml = "";
    let convHtml = "";

    if (curated) {
      // Render amb_specs as preferences list
      const specsItems = curated.amb_specs.map(s => `<li>${escapeHtml(s)}</li>`).join("");
      prefsHtml = `
        <div class="preferences">
          <h3>Your Preferences</h3>
          <ul>${specsItems}</ul>
        </div>`;

      // Render conversation
      const msgs = curated.conv_log.map(m => {
        const roleClass = m.role === "user" ? "user" : "assistant";
        const roleLabel = m.role === "user" ? "You" : "AI";
        return `<div class="conv-msg ${roleClass}"><div class="conv-msg-role">${roleLabel}</div>${escapeHtml(m.content)}</div>`;
      }).join("");
      convHtml = `
        <div class="conversation">
          <h3>Conversation</h3>
          <div class="conv-messages">${msgs}</div>
        </div>`;
    }

    card.innerHTML = `
      <div class="q-number">Question ${idx + 1} of ${selectedQuestions.length}</div>
      ${prefsHtml}
      ${convHtml}
      <div class="likert-label">How satisfied were you? (1–5)</div>
      <div class="likert-scale">${likertHtml}</div>
      <div class="likert-endpoints"><span>Not at all satisfied</span><span>Very satisfied</span></div>
      <div class="text-label">Please explain your rating:</div>
      <textarea class="text-response" id="q${idx}_text" placeholder="Type your explanation here…" oninput="handleTextInput(this)"></textarea>`;

    container.appendChild(card);
  });

  currentQuestion = 0;
  showQuestion(0);
}

// --- Show a specific question and update buttons ---
function showQuestion(idx) {
  document.querySelectorAll(".question-card").forEach(c => c.style.display = "none");
  const card = document.getElementById("card-" + idx);
  if (card) {
    card.style.display = "block";
    card.style.animation = "none";
    card.offsetHeight; // trigger reflow
    card.style.animation = "fadeUp 0.35s ease both";
  }

  const isFirst = idx === 0;
  const isLast = idx === selectedQuestions.length - 1;

  document.getElementById("back-btn").style.display = isFirst ? "none" : "";
  document.getElementById("next-btn").style.display = isLast ? "none" : "";
  document.getElementById("submit-btn").style.display = isLast ? "" : "none";
}

// --- Navigate between questions ---
function navigateQuestion(dir) {
  // If going forward, validate current question
  if (dir === 1) {
    if (!validateQuestion(currentQuestion)) return;
  }

  currentQuestion += dir;
  currentQuestion = Math.max(0, Math.min(currentQuestion, selectedQuestions.length - 1));
  showQuestion(currentQuestion);
}

// --- Validate a question (likert required, text required) ---
function validateQuestion(idx) {
  const card = document.getElementById("card-" + idx);
  const likert = document.querySelector(`input[name="q${idx}_likert"]:checked`);
  const text = document.getElementById("q" + idx + "_text").value.trim();
  if (!likert || !text) {
    card.classList.add("unanswered");
    return false;
  }
  return true;
}

// --- Likert select feedback ---
function handleLikertSelect(input) {
  input.closest(".question-card").classList.remove("unanswered");
}

// --- Text input feedback ---
function handleTextInput(textarea) {
  textarea.closest(".question-card").classList.remove("unanswered");
}

// --- Submit ---
async function handleSubmit() {
  // Validate last question
  if (!validateQuestion(currentQuestion)) return;

  const responses = [];
  selectedQuestions.forEach((q, idx) => {
    const likert = document.querySelector(`input[name="q${idx}_likert"]:checked`).value;
    const text = document.getElementById("q" + idx + "_text").value.trim();
    responses.push({
      questionId: q.questionId,
      response1: likert,
      response2: text
    });
  });

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Submitting…";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        participantId: participantId,
        responses: responses
      })
    });

    const json = await res.json();
    if (json.status !== "success") throw new Error("Submission failed");

    document.getElementById("pid-display").textContent = "Participant ID: " + participantId;
    showState("thankyou");
  } catch (err) {
    btn.disabled = false;
    btn.textContent = "Submit responses";
    document.getElementById("error-message").textContent = "Submission failed: " + err.message;
    showState("error");
  }
}

// --- Init ---
loadQuestions();
</script>
</body>
</html>
